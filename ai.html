<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f2f4f7" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="192x192.jpg" />
    <link rel="stylesheet" href="styles.css" />
    <title>KI generiert | KarteikartApp</title>
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="app-header">
        <p class="kicker">KarteikartApp</p>
        <h1>KI generiert</h1>
        <p class="subtitle">Modell und API-Key sind fest aus AI.md konfiguriert.</p>
      </header>

      <div class="study-topbar">
        <a class="topic-btn" href="index.html">Zurueck zur Home</a>
      </div>

      <form id="ai-form" class="glass form-grid">
        <label>
          Thema
          <input id="topic" type="text" placeholder="z. B. Bruchrechnung" required />
        </label>
        <label>
          Klasse
          <input id="grade" type="text" placeholder="z. B. 7" required />
        </label>
        <label>
          Anzahl Karten
          <input id="count" type="number" min="4" max="24" value="10" required />
        </label>

        <div class="actions">
          <button type="submit" class="primary">Karten generieren</button>
          <button id="export-btn" type="button">Exportieren</button>
          <label class="import-label">
            Importieren
            <input id="import-file" type="file" accept="application/json" />
          </label>
        </div>
      </form>

      <p id="status" class="status" aria-live="polite"></p>
      <section id="generated-deck" class="deck" aria-live="polite"></section>
    </main>

    <script src="pwa.js"></script>
    <script src="app.js"></script>
  </body>
</html>
