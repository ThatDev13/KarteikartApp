<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mathematik | KarteikartApp</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="study-shell">
      <div class="study-topbar">
        <a class="topic-btn" href="../index.html">Zurueck</a>
        <span class="badge">Mathematik</span>
      </div>

      <section class="glass study-card">
        <p id="progress" class="helper"></p>
        <h2 id="question"></h2>
        <p id="answer" class="answer"></p>
        <p id="hint" class="helper"></p>

        <div class="study-actions">
          <button id="reveal" class="primary">Antwort zeigen</button>
          <button id="prev">Vorherige</button>
          <button id="next">Naechste</button>
        </div>
      </section>
    </main>

    <script>
      // Diese Karten koennen direkt in dieser HTML-Datei gepflegt werden.
      window.TOPIC_CARDS = [
        { question: "Was ist 3/4 von 20?", answer: "15", hint: "Teile 20 in vier gleiche Teile." },
        { question: "Loese: 6x + 4 = 22", answer: "x = 3" },
        { question: "Wie viel ist 12 * 8?", answer: "96" },
        { question: "Was ist die Flaeche eines Rechtecks mit 7 cm und 5 cm?", answer: "35 cm^2" },
        { question: "Runde 4,678 auf eine Nachkommastelle.", answer: "4,7" },
      ];
    </script>
    <script src="../pwa.js"></script>
    <script src="shared-study.js"></script>
  </body>
</html>
