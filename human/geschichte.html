<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Geschichte | KarteikartApp</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="study-shell">
      <div class="study-topbar">
        <a class="topic-btn" href="../index.html">Zurueck</a>
        <span class="badge">Geschichte</span>
      </div>

      <section class="glass study-card">
        <p id="progress" class="helper"></p>
        <h2 id="question"></h2>
        <p id="answer" class="answer"></p>
        <p id="hint" class="helper"></p>

        <div class="study-actions">
          <button id="reveal" class="primary">Antwort zeigen</button>
          <button id="prev">Vorherige</button>
          <button id="next">Naechste</button>
        </div>
      </section>
    </main>

    <script>
      // Diese Karten koennen direkt in dieser HTML-Datei gepflegt werden.
      window.TOPIC_CARDS = [
        { question: "In welchem Jahr fiel die Berliner Mauer?", answer: "1989" },
        { question: "Wie hiess der erste Bundeskanzler der Bundesrepublik Deutschland?", answer: "Konrad Adenauer" },
        { question: "Was war die Renaissance?", answer: "Eine kulturelle Bewegung mit Rueckbesinnung auf die Antike." },
        { question: "Welche Erfindung wird Johannes Gutenberg zugeschrieben?", answer: "Buchdruck mit beweglichen Lettern" },
        { question: "Wann begann der Erste Weltkrieg?", answer: "1914" },
      ];
    </script>
    <script src="../pwa.js"></script>
    <script src="shared-study.js"></script>
  </body>
</html>
